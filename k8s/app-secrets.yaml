apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secretsmanager-store
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: invoice-worker-sa
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: shopcloud-app-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager-store
    kind: SecretStore
  target:
    name: shopcloud-app-secrets
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: shopcloud/dev/app
        property: POSTGRES_USER
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: shopcloud/dev/app
        property: POSTGRES_PASSWORD
    - secretKey: POSTGRES_DB
      remoteRef:
        key: shopcloud/dev/app
        property: POSTGRES_DB
    - secretKey: INVOICE_QUEUE_URL
      remoteRef:
        key: shopcloud/dev/app
        property: INVOICE_QUEUE_URL
    - secretKey: INVOICE_DLQ_URL
      remoteRef:
        key: shopcloud/dev/app
        property: INVOICE_DLQ_URL
    - secretKey: INVOICE_BUCKET_NAME
      remoteRef:
        key: shopcloud/dev/app
        property: INVOICE_BUCKET_NAME
    - secretKey: SES_FROM_EMAIL
      remoteRef:
        key: shopcloud/dev/app
        property: SES_FROM_EMAIL
    - secretKey: REDIS_URL
      remoteRef:
        key: shopcloud/dev/app
        property: REDIS_URL
    - secretKey: REDIS_TLS_REJECT_UNAUTHORIZED
      remoteRef:
        key: shopcloud/dev/app
        property: REDIS_TLS_REJECT_UNAUTHORIZED
