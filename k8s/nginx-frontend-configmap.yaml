apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-frontend
data:
  default.conf: |
    server {
      listen 80;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      location / {
        try_files $uri $uri/ /index.html;
      }

      location /api/products {
        proxy_set_header Authorization $http_authorization;
        proxy_pass http://catalog:3001/products;
      }

      location /api/cart/ {
        proxy_set_header Authorization $http_authorization;
        proxy_pass http://cart:3002/cart/;
      }

      location /api/checkout {
        proxy_set_header Authorization $http_authorization;
        proxy_pass http://checkout:3003/checkout;
      }

      location /api/login {
        proxy_set_header Authorization $http_authorization;
        proxy_pass http://auth:3005/auth/login;
      }

      location /api/register {
        proxy_set_header Authorization $http_authorization;
        proxy_pass http://auth:3005/auth/register;
      }

      location /api/orders {
        proxy_set_header Authorization $http_authorization;
        proxy_pass http://checkout:3003/orders;
      }

      location /api/auth/me {
        proxy_set_header Authorization $http_authorization;
        proxy_pass http://auth:3005/auth/me;
      }

      location /api/auth/admin-check {
        proxy_set_header Authorization $http_authorization;
        proxy_pass http://auth:3005/auth/admin-check;
      }

      location /health {
        add_header Content-Type application/json;
        return 200 '{"service":"nginx-frontend","status":"ok"}';
      }
    }
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>ShopCloud</title>
        <link rel="stylesheet" href="/styles.css" />
      </head>
      <body>
        <div id="toast" class="toast" role="status" aria-live="polite"></div>
        <header class="topbar">
          <div class="brand">ShopCloud</div>
          <nav class="topnav">
            <button class="nav-btn active" data-page="home">Home</button>
            <button class="nav-btn" data-page="catalog">Catalog</button>
            <button class="nav-btn cart-nav-btn" data-page="cart">
              &#128722; Cart <span id="cartCount" class="cart-count">0</span>
            </button>
            <button class="nav-btn" data-page="checkout">Checkout</button>
          </nav>
          <div class="session">
            <span id="sessionBadge" class="badge">Guest</span>
            <button id="logoutBtn" class="ghost-btn">Logout</button>
          </div>
        </header>

        <main class="container">
          <section class="page active" id="page-home">
            <h1>Welcome to ShopCloud</h1>
            <p class="muted">
              Shop essentials delivered fast across EU and US.
            </p>
            <div class="hero-strip">
              <div class="hero-card">
                <h3>Fast Delivery</h3>
                <p>Same-day dispatch for top products.</p>
              </div>
              <div class="hero-card">
                <h3>Secure Checkout</h3>
                <p>Protected session and order workflow.</p>
              </div>
              <div class="hero-card">
                <h3>Always Available</h3>
                <p>Built with multi-service cloud architecture.</p>
              </div>
            </div>
            <div class="panel">
              <h2>Sign In</h2>
              <p class="muted small">
                New here? Create an account with your email, then you can check out. Invoices are sent to that same
                email.
              </p>
              <div class="form-row">
                <input id="email" placeholder="Email" value="customer@example.com" />
                <input id="password" placeholder="Password" type="password" value="change-me-customer" />
              </div>
              <div class="form-row">
                <button id="loginBtn">Login</button>
                <button id="registerBtn" type="button" class="ghost-btn">Create account</button>
              </div>
            </div>
          </section>

          <section class="page" id="page-catalog">
            <h1>Catalog</h1>
            <div class="form-row">
              <button id="productsBtn">Load Products</button>
            </div>
            <div id="productsGrid" class="products-grid"></div>
          </section>

          <section class="page" id="page-cart">
            <h1>Your Cart</h1>
            <p class="muted">Please sign in first, then add items from the catalog.</p>
            <div class="form-row">
              <input id="productId" placeholder="Product ID (ex: p-1001)" value="p-1001" />
              <input id="quantity" type="number" min="1" value="1" />
            </div>
            <div class="form-row">
              <button id="addCartBtn">Add Item</button>
              <button id="viewCartBtn" class="ghost-btn">Refresh Cart</button>
              <button id="clearCartBtn" class="danger-btn">Clear Cart</button>
              <button id="goCheckoutBtn" type="button">Go to checkout</button>
            </div>
            <div id="cartList" class="cart-list"></div>
          </section>

          <section class="page" id="page-checkout">
            <h1>Checkout</h1>
            <p class="muted">Checkout uses your signed-in account. Your order is confirmed immediately.</p>
            <p class="muted" id="checkoutInvoiceHint">
              Your invoice PDF will be emailed to <strong id="checkoutEmailHint">—</strong> shortly (this does not delay
              checkout).
            </p>
            <p class="checkout-internal-hint muted">
              Warehouse staff: inventory, stock, returns, and order tables live on the <strong>internal admin</strong> app
              (VPN / internal URL only), not on this public page.
            </p>
            <div class="form-row">
              <button id="checkoutBtn">Place Order</button>
            </div>
          </section>

        </main>

        <button id="floatingCartBtn" class="floating-cart-btn" aria-label="Open cart page">
          &#128722;
        </button>

        <script src="/app.js"></script>
      </body>
    </html>
  app.js: |
    const toast = document.getElementById("toast");
    const cartList = document.getElementById("cartList");
    const productsGrid = document.getElementById("productsGrid");
    const sessionBadge = document.getElementById("sessionBadge");
    const cartCount = document.getElementById("cartCount");

    const session = {
      accessToken: "",
      user: null
    };

    let toastTimer = null;

    function authHeaders() {
      return session.accessToken ? { Authorization: `Bearer ${session.accessToken}` } : {};
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function showToast(message, variant = "info") {
      if (!toast) {
        return;
      }

      toast.textContent = message;
      toast.classList.remove("toast-error");
      if (variant === "error") {
        toast.classList.add("toast-error");
      }

      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.remove("show");
      }, 3500);
    }

    async function request(path, options = {}) {
      const headers = {
        ...(options.headers || {}),
        ...authHeaders()
      };

      const response = await fetch(path, { ...options, headers });
      const text = await response.text();
      let body = {};
      try {
        body = text ? JSON.parse(text) : {};
      } catch {
        body = { raw: text };
      }
      if (!response.ok) {
        const err = new Error(JSON.stringify(body));
        err.status = response.status;
        throw err;
      }
      return body;
    }

    function requireSignedIn() {
      if (!session.accessToken || !session.user) {
        showToast("Please sign in on Home first.", "error");
        switchPage("home");
        return false;
      }
      return true;
    }

    function setSession(user, token) {
      session.user = user || null;
      session.accessToken = token || "";
      const label = session.user ? `${session.user.email} (${session.user.role})` : "Guest";
      sessionBadge.textContent = label;
      updateCheckoutEmailHint();
      updateCartCount().catch(() => {});
    }

    function updateCheckoutEmailHint() {
      const hint = document.getElementById("checkoutEmailHint");
      if (!hint) {
        return;
      }
      const email = session.user && typeof session.user.email === "string" ? session.user.email : "";
      hint.textContent = email || "— (sign in with an email)";
    }

    function switchPage(page) {
      document.querySelectorAll(".page").forEach((element) => {
        const isCurrent = element.id === `page-${page}`;
        element.classList.toggle("active", isCurrent);
      });
      document.querySelectorAll(".nav-btn").forEach((button) => {
        button.classList.toggle("active", button.dataset.page === page);
      });

      if (page === "checkout") {
        updateCheckoutEmailHint();
      }

      if (page === "cart" && session.accessToken) {
        refreshCartView().catch((error) => showToast(error.message || "Could not load cart", "error"));
      }
    }

    function renderProducts(items) {
      if (!Array.isArray(items) || items.length === 0) {
        productsGrid.innerHTML = "<p class='muted'>No products found.</p>";
        return;
      }

      productsGrid.innerHTML = items
        .map(
          (item) => `
          <article class="product-card">
            <h3>${escapeHtml(item.name)}</h3>
            <p class="muted">${escapeHtml(item.category || "general")}</p>
            <p><strong>$${Number(item.price).toFixed(2)}</strong></p>
            <p>${escapeHtml(item.description || "")}</p>
            <button class="quick-add" data-product-id="${escapeHtml(item.id)}">Add to Cart</button>
          </article>
        `
        )
        .join("");

      document.querySelectorAll(".quick-add").forEach((button) => {
        button.addEventListener("click", async () => {
          if (!requireSignedIn()) {
            return;
          }

          const productId = button.dataset.productId;
          try {
            await request(`/api/cart/${encodeURIComponent(session.user.id)}/items`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ productId, quantity: 1 })
            });
            showToast("Added to cart");
            await updateCartCount();
            switchPage("cart");
          } catch (error) {
            showToast(error.message || "Could not add to cart", "error");
          }
        });
      });
    }

    function renderCart(data) {
      if (!cartList) {
        return;
      }

      const items = Array.isArray(data?.items) ? data.items : [];
      if (items.length === 0) {
        cartList.innerHTML = "<div class='cart-row'><div>Your cart is empty.</div></div>";
        return;
      }

      const rows = [
        `<div class="cart-row header"><div>Product</div><div>Qty</div><div></div></div>`
      ];

      for (const item of items) {
        rows.push(
          `<div class="cart-row">
            <div>${escapeHtml(item.productId)}</div>
            <div>${escapeHtml(String(item.quantity))}</div>
            <div></div>
          </div>`
        );
      }

      cartList.innerHTML = rows.join("");
    }

    async function updateCartCount() {
      if (!session.user || !session.user.id || !session.accessToken) {
        cartCount.textContent = "0";
        return;
      }
      try {
        const data = await request(`/api/cart/${encodeURIComponent(session.user.id)}`);
        const count = Array.isArray(data.items)
          ? data.items.reduce((sum, item) => sum + Number(item.quantity || 0), 0)
          : 0;
        cartCount.textContent = String(count);
      } catch {
        cartCount.textContent = "0";
      }
    }

    async function refreshCartView() {
      if (!session.user || !session.user.id) {
        renderCart({ items: [] });
        return;
      }
      const data = await request(`/api/cart/${encodeURIComponent(session.user.id)}`);
      renderCart(data);
    }

    document.querySelectorAll(".nav-btn").forEach((button) => {
      button.addEventListener("click", () => {
        const page = button.dataset.page;
        if ((page === "cart" || page === "checkout") && !session.accessToken) {
          showToast("Please sign in first.", "error");
          switchPage("home");
          return;
        }
        switchPage(page);
      });
    });

    async function syncSessionFromAuthMe(accessToken) {
      if (!accessToken) {
        return;
      }
      try {
        const me = await request("/api/auth/me");
        if (me && me.user) {
          setSession(me.user, accessToken);
        }
      } catch {
        /* keep login/register payload if /me fails */
      }
    }

    document.getElementById("loginBtn").addEventListener("click", async () => {
      try {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const data = await request("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        setSession(data.user, data.accessToken);
        switchPage("catalog");
        showToast("Signed in");
        await syncSessionFromAuthMe(data.accessToken);

        const products = await request("/api/products");
        renderProducts(products);
      } catch (error) {
        showToast(error.message || "Login failed", "error");
      }
    });

    document.getElementById("registerBtn").addEventListener("click", async () => {
      try {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        if (!email || !password) {
          showToast("Enter email and password (min 6 characters).", "error");
          return;
        }
        const data = await request("/api/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password, role: "customer" })
        });
        if (!data.accessToken) {
          showToast("Account created — please log in.", "info");
          return;
        }
        setSession(data.user, data.accessToken);
        switchPage("catalog");
        showToast("Account created — you are signed in");
        await syncSessionFromAuthMe(data.accessToken);
        const products = await request("/api/products");
        renderProducts(products);
      } catch (error) {
        const msg = error.message || "Sign up failed";
        if (String(msg).includes("503") || msg.toLowerCase().includes("cognito")) {
          showToast("Sign-up here is for local dev only. Use your Cognito sign-up flow in production.", "error");
        } else {
          showToast(msg, "error");
        }
      }
    });

    document.getElementById("logoutBtn").addEventListener("click", () => {
      setSession(null, "");
      renderCart({ items: [] });
      showToast("Signed out");
    });

    document.getElementById("floatingCartBtn").addEventListener("click", () => {
      if (!session.accessToken) {
        showToast("Please sign in first.", "error");
        switchPage("home");
        return;
      }
      switchPage("cart");
    });

    document.getElementById("productsBtn").addEventListener("click", async () => {
      try {
        const products = await request("/api/products");
        renderProducts(products);
      } catch (error) {
        showToast(error.message || "Could not load products", "error");
      }
    });

    document.getElementById("addCartBtn").addEventListener("click", async () => {
      if (!requireSignedIn()) {
        return;
      }

      try {
        const productId = document.getElementById("productId").value;
        const quantity = Number(document.getElementById("quantity").value);
        await request(`/api/cart/${encodeURIComponent(session.user.id)}/items`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ productId, quantity })
        });
        showToast("Added to cart");
        await updateCartCount();
        await refreshCartView();
      } catch (error) {
        showToast(error.message || "Could not add item", "error");
      }
    });

    document.getElementById("viewCartBtn").addEventListener("click", async () => {
      if (!requireSignedIn()) {
        return;
      }
      try {
        await refreshCartView();
        showToast("Cart updated");
      } catch (error) {
        showToast(error.message || "Could not refresh cart", "error");
      }
    });

    document.getElementById("clearCartBtn").addEventListener("click", async () => {
      if (!requireSignedIn()) {
        return;
      }
      try {
        await request(`/api/cart/${encodeURIComponent(session.user.id)}`, { method: "DELETE" });
        showToast("Cart cleared");
        await updateCartCount();
        await refreshCartView();
      } catch (error) {
        showToast(error.message || "Could not clear cart", "error");
      }
    });

    document.getElementById("goCheckoutBtn").addEventListener("click", () => {
      if (!requireSignedIn()) {
        return;
      }
      switchPage("checkout");
    });

    document.getElementById("checkoutBtn").addEventListener("click", async () => {
      if (!requireSignedIn()) {
        return;
      }
      try {
        const data = await request("/api/checkout", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({})
        });
        showToast(`Order placed: ${data.orderId}. Invoice will be emailed shortly.`);
        await updateCartCount();
        await refreshCartView();
      } catch (error) {
        showToast(error.message || "Checkout failed", "error");
      }
    });

  styles.css: |
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff5fb;
      color: #6b1f3d;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 24px;
      background: linear-gradient(90deg, #ff6fb7, #ff4f9a);
      color: #fff;
    }

    .brand {
      font-size: 22px;
      font-weight: 700;
    }

    .topnav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .nav-btn,
    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(90deg, #ff7fb3, #ff5fa0);
      color: #fff;
    }

    .nav-btn.active {
      background: linear-gradient(90deg, #ff9ac7, #ff7fb3);
    }

    .ghost-btn {
      background: #ffe6f2;
      color: #6b1f3d;
    }

    .danger-btn {
      background: #ff5f8a;
    }

    .session {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge {
      display: inline-block;
      border-radius: 999px;
      background: #ff5fa0;
      padding: 6px 10px;
      font-size: 13px;
    }

    .cart-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 22px;
      margin-left: 6px;
      padding: 0 6px;
      border-radius: 999px;
      background: #ffffff;
      color: #6b1f3d;
      font-size: 12px;
    }

    .container {
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 16px 24px;
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    .panel {
      background: #fff;
      border: 1px solid #f2c4e7;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 18px;
      box-shadow: 0 8px 24px rgba(255, 79, 154, 0.12);
    }

    .hero-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .hero-card {
      background: linear-gradient(135deg, #ffffff, #ffe6f2);
      border: 1px solid #ffd0e8;
      border-radius: 14px;
      padding: 12px;
    }

    .hero-card h3 {
      margin: 0 0 6px;
    }

    .hero-card p {
      margin: 0;
      color: #a14b6f;
    }

    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 10px 0;
    }

    input {
      flex: 1;
      min-width: 220px;
      border: 1px solid #e8b7dd;
      border-radius: 10px;
      padding: 10px;
      font-size: 14px;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
    }

    .product-card {
      background: #fff;
      border: 1px solid #f2c4e7;
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 8px 20px rgba(255, 79, 154, 0.12);
    }

    .product-card h3 {
      margin: 0 0 8px;
    }

    .muted {
      color: #a14b6f;
    }

    .muted.small {
      font-size: 0.875rem;
      line-height: 1.45;
    }

    .checkout-internal-hint {
      max-width: 42rem;
      padding: 10px 12px;
      border-left: 4px solid #ff4f9a;
      background: #fff8fc;
      border-radius: 0 8px 8px 0;
    }

    .cart-list {
      margin-top: 12px;
      border: 1px solid #ffd0e8;
      border-radius: 14px;
      background: #ffffff;
      overflow: hidden;
    }

    .cart-row {
      display: grid;
      grid-template-columns: 1fr 120px 120px;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid #ffe6f2;
      align-items: center;
    }

    .cart-row:last-child {
      border-bottom: 0;
    }

    .cart-row.header {
      font-weight: 700;
      background: #fff5fb;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      z-index: 50;
      max-width: min(720px, calc(100% - 32px));
      padding: 12px 14px;
      border-radius: 12px;
      background: #ffffff;
      border: 1px solid #ffd0e8;
      box-shadow: 0 10px 28px rgba(255, 79, 154, 0.18);
      color: #6b1f3d;
      display: none;
    }

    .toast.show {
      display: block;
    }

    .toast-error {
      border-color: #ffb3c7;
      background: #fff0f4;
    }

    .floating-cart-btn {
      position: fixed;
      right: 18px;
      bottom: 18px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(90deg, #ff7fb3, #ff5fa0);
      box-shadow: 0 10px 28px rgba(255, 79, 154, 0.28);
      font-size: 22px;
    }
