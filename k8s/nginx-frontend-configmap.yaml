apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-frontend
data:
  default.conf: |
    server {
      listen 80;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      location / {
        try_files $uri $uri/ /index.html;
      }

      location /api/products {
        proxy_set_header Authorization $http_authorization;
        proxy_pass http://catalog:3001/products;
      }

      location /api/cart/ {
        proxy_set_header Authorization $http_authorization;
        proxy_pass http://cart:3002/cart/;
      }

      location /api/checkout {
        proxy_set_header Authorization $http_authorization;
        proxy_pass http://checkout:3003/checkout;
      }

      location /api/login {
        proxy_set_header Authorization $http_authorization;
        proxy_pass http://auth:3005/auth/login;
      }

      location /api/orders {
        proxy_set_header Authorization $http_authorization;
        proxy_pass http://checkout:3003/orders;
      }

      location /api/auth/me {
        proxy_set_header Authorization $http_authorization;
        proxy_pass http://auth:3005/auth/me;
      }

      location /api/auth/admin-check {
        proxy_set_header Authorization $http_authorization;
        proxy_pass http://auth:3005/auth/admin-check;
      }

      location /health {
        add_header Content-Type application/json;
        return 200 '{"service":"nginx-frontend","status":"ok"}';
      }
    }
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>ShopCloud</title>
        <link rel="stylesheet" href="/styles.css" />
      </head>
      <body>
        <header class="topbar">
          <div class="brand">ShopCloud</div>
          <nav class="topnav">
            <button class="nav-btn active" data-page="home">Home</button>
            <button class="nav-btn" data-page="catalog">Catalog</button>
            <button class="nav-btn" data-page="cart">Cart</button>
            <button class="nav-btn" data-page="checkout">Checkout</button>
            <button class="nav-btn" data-page="admin">Admin</button>
          </nav>
          <div class="session">
            <span id="sessionBadge" class="badge">Guest</span>
            <button id="logoutBtn" class="ghost-btn">Logout</button>
          </div>
        </header>
        <main class="container">
          <section class="page active" id="page-home">
            <h1>Welcome to ShopCloud</h1>
            <p class="muted">Demo storefront with auth, catalog, cart, checkout, and admin tools.</p>
            <div class="panel">
              <h2>Sign In</h2>
              <div class="form-row">
                <input id="email" placeholder="Email" value="customer@example.com" />
                <input id="password" placeholder="Password" type="password" value="change-me-customer" />
              </div>
              <div class="form-row">
                <button id="loginBtn">Login</button>
                <button id="whoamiBtn" class="ghost-btn">Who am I?</button>
              </div>
            </div>
          </section>
          <section class="page" id="page-catalog">
            <h1>Catalog</h1>
            <div class="form-row"><button id="productsBtn">Load Products</button></div>
            <div id="productsGrid" class="products-grid"></div>
          </section>
          <section class="page" id="page-cart">
            <h1>Your Cart</h1>
            <p class="muted">User ID is auto-filled from token session after login.</p>
            <div class="form-row">
              <input id="userId" placeholder="User ID" value="u1" />
              <input id="productId" placeholder="Product ID (ex: p-1001)" value="p-1001" />
              <input id="quantity" type="number" min="1" value="1" />
            </div>
            <div class="form-row">
              <button id="addCartBtn">Add Item</button>
              <button id="viewCartBtn" class="ghost-btn">Refresh Cart</button>
              <button id="clearCartBtn" class="danger-btn">Clear Cart</button>
            </div>
            <pre id="cartOutput" class="small-output">Cart is empty.</pre>
          </section>
          <section class="page" id="page-checkout">
            <h1>Checkout</h1>
            <div class="form-row">
              <button id="checkoutBtn">Place Order</button>
              <button id="ordersBtn" class="ghost-btn">View Orders (Admin)</button>
            </div>
          </section>
          <section class="page" id="page-admin">
            <h1>Admin</h1>
            <div class="form-row"><button id="adminCheckBtn">Check Admin Access</button></div>
          </section>
          <section class="panel">
            <h2>Activity</h2>
            <pre id="output">Ready.</pre>
          </section>
        </main>
        <script src="/app.js"></script>
      </body>
    </html>
  app.js: |
    const output = document.getElementById("output");
    const cartOutput = document.getElementById("cartOutput");
    const productsGrid = document.getElementById("productsGrid");
    const sessionBadge = document.getElementById("sessionBadge");
    const session = { accessToken: "", user: null };
    function authHeaders() {
      return session.accessToken ? { Authorization: `Bearer ${session.accessToken}` } : {};
    }
    async function request(path, options = {}) {
      const headers = { ...(options.headers || {}), ...authHeaders() };
      const response = await fetch(path, { ...options, headers });
      const text = await response.text();
      let body = {};
      try {
        body = text ? JSON.parse(text) : {};
      } catch {
        body = { raw: text };
      }
      if (!response.ok) {
        throw new Error(JSON.stringify(body));
      }
      return body;
    }
    function show(data) {
      output.textContent = typeof data === "string" ? data : JSON.stringify(data, null, 2);
    }
    function setSession(user, token) {
      session.user = user || null;
      session.accessToken = token || "";
      sessionBadge.textContent = session.user ? `${session.user.email} (${session.user.role})` : "Guest";
      if (session.user && session.user.id) {
        document.getElementById("userId").value = session.user.id;
      }
    }
    function switchPage(page) {
      document.querySelectorAll(".page").forEach((element) => {
        const isCurrent = element.id === `page-${page}`;
        element.classList.toggle("active", isCurrent);
      });
      document.querySelectorAll(".nav-btn").forEach((button) => {
        button.classList.toggle("active", button.dataset.page === page);
      });
    }
    function renderProducts(items) {
      if (!Array.isArray(items) || items.length === 0) {
        productsGrid.innerHTML = "<p class='muted'>No products found.</p>";
        return;
      }
      productsGrid.innerHTML = items.map((item) => `
        <article class="product-card">
          <h3>${item.name}</h3>
          <p class="muted">${item.category || "general"}</p>
          <p><strong>$${Number(item.price).toFixed(2)}</strong></p>
          <p>${item.description || ""}</p>
          <button class="quick-add" data-product-id="${item.id}">Add to Cart</button>
        </article>
      `).join("");
      document.querySelectorAll(".quick-add").forEach((button) => {
        button.addEventListener("click", async () => {
          const userId = document.getElementById("userId").value;
          const productId = button.dataset.productId;
          try {
            const result = await request(`/api/cart/${encodeURIComponent(userId)}/items`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ productId, quantity: 1 })
            });
            show({ added: productId, cart: result });
            switchPage("cart");
          } catch (error) {
            show(error.message);
          }
        });
      });
    }
    document.querySelectorAll(".nav-btn").forEach((button) => {
      button.addEventListener("click", () => switchPage(button.dataset.page));
    });
    document.getElementById("loginBtn").addEventListener("click", async () => {
      try {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const data = await request("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        setSession(data.user, data.accessToken);
        show({ message: "Logged in", user: data.user });
      } catch (error) {
        show(error.message);
      }
    });
    document.getElementById("logoutBtn").addEventListener("click", () => {
      setSession(null, "");
      show("Logged out.");
    });
    document.getElementById("whoamiBtn").addEventListener("click", async () => {
      try {
        const data = await request("/api/auth/me");
        setSession(data.user, session.accessToken);
        show(data);
      } catch (error) {
        show(error.message);
      }
    });
    document.getElementById("productsBtn").addEventListener("click", async () => {
      try {
        const products = await request("/api/products");
        renderProducts(products);
        show({ count: Array.isArray(products) ? products.length : 0 });
      } catch (error) {
        show(error.message);
      }
    });
    document.getElementById("addCartBtn").addEventListener("click", async () => {
      try {
        const userId = document.getElementById("userId").value;
        const productId = document.getElementById("productId").value;
        const quantity = Number(document.getElementById("quantity").value);
        const data = await request(`/api/cart/${encodeURIComponent(userId)}/items`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ productId, quantity })
        });
        cartOutput.textContent = JSON.stringify(data, null, 2);
        show("Item added to cart.");
      } catch (error) {
        show(error.message);
      }
    });
    document.getElementById("viewCartBtn").addEventListener("click", async () => {
      try {
        const userId = document.getElementById("userId").value;
        const data = await request(`/api/cart/${encodeURIComponent(userId)}`);
        cartOutput.textContent = JSON.stringify(data, null, 2);
        show("Cart refreshed.");
      } catch (error) {
        show(error.message);
      }
    });
    document.getElementById("clearCartBtn").addEventListener("click", async () => {
      try {
        const userId = document.getElementById("userId").value;
        const data = await request(`/api/cart/${encodeURIComponent(userId)}`, { method: "DELETE" });
        cartOutput.textContent = JSON.stringify(data, null, 2);
        show("Cart cleared.");
      } catch (error) {
        show(error.message);
      }
    });
    document.getElementById("checkoutBtn").addEventListener("click", async () => {
      try {
        const data = await request("/api/checkout", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({})
        });
        show({ message: "Order placed", order: data });
      } catch (error) {
        show(error.message);
      }
    });
    document.getElementById("ordersBtn").addEventListener("click", async () => {
      try {
        show(await request("/api/orders"));
      } catch (error) {
        show(error.message);
      }
    });
    document.getElementById("adminCheckBtn").addEventListener("click", async () => {
      try {
        show(await request("/api/auth/admin-check"));
      } catch (error) {
        show(error.message);
      }
    });
  styles.css: |
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #f4f7fb; color: #10203a; }
    .topbar { position: sticky; top: 0; z-index: 20; display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 24px; background: #10203a; color: #fff; }
    .brand { font-size: 22px; font-weight: 700; }
    .topnav { display: flex; flex-wrap: wrap; gap: 8px; }
    .nav-btn, button { border: 0; border-radius: 10px; padding: 10px 14px; font-weight: 600; cursor: pointer; background: #2f6fed; color: #fff; }
    .nav-btn.active { background: #26a269; }
    .ghost-btn { background: #dbe7ff; color: #10203a; }
    .danger-btn { background: #d03a3a; }
    .session { display: flex; align-items: center; gap: 8px; }
    .badge { display: inline-block; border-radius: 999px; background: #1f3f72; padding: 6px 10px; font-size: 13px; }
    .container { max-width: 1100px; margin: 24px auto; padding: 0 16px 24px; }
    .page { display: none; }
    .page.active { display: block; }
    .panel { background: #fff; border: 1px solid #dde6f4; border-radius: 14px; padding: 16px; margin-bottom: 18px; box-shadow: 0 6px 20px rgba(16, 32, 58, 0.05); }
    .form-row { display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0; }
    input { flex: 1; min-width: 220px; border: 1px solid #c8d5ea; border-radius: 10px; padding: 10px; font-size: 14px; }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; }
    .product-card { background: #fff; border: 1px solid #dde6f4; border-radius: 14px; padding: 14px; box-shadow: 0 6px 20px rgba(16, 32, 58, 0.05); }
    .product-card h3 { margin: 0 0 8px; }
    .muted { color: #5a6f92; }
    pre { background: #0f1a2d; color: #e8efff; border-radius: 10px; padding: 12px; min-height: 120px; overflow: auto; }
    .small-output { min-height: 90px; }
