# Internal ALB only (private IPs). Replace subnet IDs with your VPC *private* subnets
# (same AZs as worker nodes). Never attach the admin Service to a public-facing Ingress.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: admin-private
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    # Allow only VPC + Client VPN CIDR to reach the internal ALB listener.
    alb.ingress.kubernetes.io/inbound-cidrs: 10.0.0.0/16,172.20.0.0/22
    alb.ingress.kubernetes.io/subnets: subnet-0d952dca4ad6ac138,subnet-056fd5e4798e25a3f
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin
                port:
                  number: 3006
