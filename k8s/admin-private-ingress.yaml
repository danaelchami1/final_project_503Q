# Internal ALB only (private IPs).
# Never attach the admin Service to a public-facing Ingress.
# IMPORTANT: set subnet discovery tags on your private subnets for AWS Load Balancer Controller,
# or define explicit subnets/cidrs in an environment-specific overlay.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: admin-private
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    # Set these in env-specific overlays if you need strict listener CIDR controls:
    # alb.ingress.kubernetes.io/inbound-cidrs: 10.0.0.0/16,172.20.0.0/22
    # alb.ingress.kubernetes.io/subnets: subnet-aaa,subnet-bbb
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin
                port:
                  number: 3006
