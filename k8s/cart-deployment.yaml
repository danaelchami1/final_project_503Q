apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart
  labels:
    app: cart
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: cart
  template:
    metadata:
      labels:
        app: cart
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: cart
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: cart
                topologyKey: kubernetes.io/hostname
      containers:
        - name: cart
          image: 680666325893.dkr.ecr.us-east-1.amazonaws.com/shopcloud-cart:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 3002
          env:
            - name: PORT
              value: "3002"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: shopcloud-app-secrets
                  key: REDIS_URL
                  optional: true
            - name: REDIS_TLS_REJECT_UNAUTHORIZED
              valueFrom:
                secretKeyRef:
                  name: shopcloud-app-secrets
                  key: REDIS_TLS_REJECT_UNAUTHORIZED
                  optional: true
            - name: AUTH_SERVICE_URL
              value: "http://auth:3005"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 20
