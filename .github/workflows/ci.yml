name: CI

on:
  pull_request:
  push:
    branches: [main, develop, phase2-continuation]

jobs:
  build-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [catalog, cart, checkout, auth, admin, invoice-worker]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t shopcloud-${{ matrix.service }}:ci ./services/${{ matrix.service }}
