name: CI

on:
  pull_request:
  push:
    branches: [main, develop, phase2-continuation]

jobs:
  validate-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [catalog, cart, checkout, auth, admin, invoice-worker]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Block committed sensitive infra files
        run: |
          blocked=$(git ls-files | grep -E '(^|/)(terraform\.tfvars|.*\.tfstate|.*\.tfstate\.backup)$' || true)
          if [ -n "$blocked" ]; then
            echo "Blocked sensitive files detected:"
            echo "$blocked"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ./services/${{ matrix.service }}
        run: npm ci

      - name: Validate entrypoint syntax
        working-directory: ./services/${{ matrix.service }}
        run: node --check src/index.js

  build-services:
    needs: validate-services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [catalog, cart, checkout, auth, admin, invoice-worker]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t shopcloud-${{ matrix.service }}:ci ./services/${{ matrix.service }}
