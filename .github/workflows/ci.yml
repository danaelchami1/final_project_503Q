name: CI

on:
  pull_request:
  push:
    branches: [main, develop, phase2-continuation]

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  terraform-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform format check
        run: terraform fmt -check

      - name: Terraform validate
        run: terraform validate

  validate-k8s-manifests:
    needs: terraform-validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Validate Kubernetes manifests
        run: |
          export KUBECONFIG=/dev/null
          for f in k8s/*.yaml; do
            # Offline client-side validation only (no cluster discovery).
            kubectl create --dry-run=client -f "$f" >/dev/null
            echo "Validated $f"
          done

  validate-compose:
    needs: validate-k8s-manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker compose definition
        run: docker compose config -q

  lint-dockerfiles:
    needs: validate-k8s-manifests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [catalog, cart, checkout, auth, admin, invoice-worker]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: services/${{ matrix.service }}/Dockerfile

  validate-services:
    needs: [terraform-validate, validate-k8s-manifests, validate-compose, lint-dockerfiles]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [catalog, cart, checkout, auth, admin, invoice-worker]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Block committed sensitive infra files
        run: |
          blocked=$(git ls-files | grep -E '(^|/)(terraform\.tfvars|.*\.tfstate|.*\.tfstate\.backup)$' || true)
          if [ -n "$blocked" ]; then
            echo "Blocked sensitive files detected:"
            echo "$blocked"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ./services/${{ matrix.service }}
        run: npm ci

      - name: Validate entrypoint syntax
        working-directory: ./services/${{ matrix.service }}
        run: node --check src/index.js

  build-services:
    needs: validate-services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [catalog, cart, checkout, auth, admin, invoice-worker]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t shopcloud-${{ matrix.service }}:ci ./services/${{ matrix.service }}

  integration-smoke:
    needs: build-services
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install root dependencies
        run: npm ci

      - name: Start local integration stack
        run: docker compose up -d --build

      - name: Wait for stack boot
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3001/health >/dev/null; then
              echo "catalog is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "stack did not become healthy in time"
          exit 1

      - name: Run smoke test
        run: npm run smoke

      - name: Teardown local integration stack
        if: always()
        run: docker compose down -v

  security-audit:
    needs: [build-services, integration-smoke]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [catalog, cart, checkout, auth, admin, invoice-worker]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ./services/${{ matrix.service }}
        run: npm ci

      - name: Audit runtime dependencies
        working-directory: ./services/${{ matrix.service }}
        run: npm audit --omit=dev --audit-level=critical
