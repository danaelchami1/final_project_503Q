name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: "Previously built tag to promote to prod (commit SHA)"
        required: true
        type: string

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Verify environment boundary (AWS account and registry)
        env:
          EXPECTED_AWS_ACCOUNT_ID: ${{ secrets.EXPECTED_AWS_ACCOUNT_ID }}
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
        run: |
          caller_account_id=$(aws sts get-caller-identity --query Account --output text)
          echo "Caller account: ${caller_account_id}"

          if [ -n "${EXPECTED_AWS_ACCOUNT_ID}" ] && [ "${caller_account_id}" != "${EXPECTED_AWS_ACCOUNT_ID}" ]; then
            echo "AWS account mismatch: expected ${EXPECTED_AWS_ACCOUNT_ID}, got ${caller_account_id}"
            exit 1
          fi

          ecr_account_id=$(echo "${ECR_REGISTRY}" | cut -d. -f1)
          if [ "${caller_account_id}" != "${ecr_account_id}" ]; then
            echo "ECR registry account mismatch: registry=${ecr_account_id}, caller=${caller_account_id}"
            exit 1
          fi

      - name: Configure kubeconfig for EKS
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
        run: |
          aws eks update-kubeconfig --name "${EKS_CLUSTER_NAME}" --region "${AWS_REGION}"

      - name: Deploy image tag to production
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          SOURCE_TAG: ${{ inputs.source_tag }}
        run: |
          resolve_image_uri() {
            local service="$1"
            local digest
            digest=$(aws ecr describe-images \
              --repository-name "shopcloud-${service}" \
              --image-ids imageTag="${SOURCE_TAG}" \
              --query 'imageDetails[0].imageDigest' \
              --output text)

            if [ -z "${digest}" ] || [ "${digest}" = "None" ]; then
              echo "Unable to find digest for ${service} with tag ${SOURCE_TAG}"
              exit 1
            fi

            echo "${ECR_REGISTRY}/shopcloud-${service}@${digest}"
          }

          kubectl set image deployment/catalog catalog=$(resolve_image_uri catalog)
          kubectl set image deployment/cart cart=$(resolve_image_uri cart)
          kubectl set image deployment/checkout checkout=$(resolve_image_uri checkout)
          kubectl set image deployment/auth auth=$(resolve_image_uri auth)
          kubectl set image deployment/admin admin=$(resolve_image_uri admin)
          kubectl set image deployment/invoice-worker invoice-worker=$(resolve_image_uri invoice-worker)

      - name: Enforce target replica counts
        run: |
          kubectl scale deployment/catalog --replicas=2
          kubectl scale deployment/cart --replicas=2
          kubectl scale deployment/checkout --replicas=2
          kubectl scale deployment/auth --replicas=2
          kubectl scale deployment/admin --replicas=2
          kubectl scale deployment/invoice-worker --replicas=1

      - name: Verify post-deployment health
        run: |
          kubectl rollout status deployment/catalog --timeout=900s
          kubectl rollout status deployment/cart --timeout=900s
          kubectl rollout status deployment/checkout --timeout=900s
          kubectl rollout status deployment/auth --timeout=900s
          kubectl rollout status deployment/admin --timeout=900s
          kubectl rollout status deployment/invoice-worker --timeout=900s

      - name: Enforce HA replica readiness for core services
        run: |
          for svc in catalog cart checkout auth admin; do
            desired=$(kubectl get deployment/${svc} -o jsonpath='{.spec.replicas}')
            ready=$(kubectl get deployment/${svc} -o jsonpath='{.status.readyReplicas}')
            available=$(kubectl get deployment/${svc} -o jsonpath='{.status.availableReplicas}')
            ready=${ready:-0}
            available=${available:-0}
            echo "${svc}: desired=${desired}, ready=${ready}, available=${available}"

            if [ "${desired}" -lt 2 ] || [ "${ready}" -lt 2 ] || [ "${available}" -lt 2 ]; then
              echo "HA requirement failed for ${svc}: expected at least 2 desired/ready/available replicas."
              kubectl get deployment/${svc} -o wide || true
              kubectl get pods -l app=${svc} -o wide || true
              kubectl describe deployment/${svc} || true
              exit 1
            fi
          done

      - name: Roll back deployments on failure
        if: failure()
        run: |
          kubectl rollout undo deployment/catalog || true
          kubectl rollout undo deployment/cart || true
          kubectl rollout undo deployment/checkout || true
          kubectl rollout undo deployment/auth || true
          kubectl rollout undo deployment/admin || true
          kubectl rollout undo deployment/invoice-worker || true
