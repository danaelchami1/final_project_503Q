name: Deploy Dev

on:
  push:
    branches: [develop, phase2-continuation]
  workflow_dispatch:

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and tag service images
        run: |
          for s in catalog cart checkout auth admin invoice-worker; do
            docker build -t shopcloud-$s:${GITHUB_SHA} ./services/$s
          done

      - name: Deploy to development environment
        run: |
          echo "TODO: deploy images to dev target (EKS/ECS/Kubernetes manifests)"
          echo "Image tag: ${GITHUB_SHA}"
