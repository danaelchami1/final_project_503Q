name: Deploy Dev

on:
  push:
    branches: [main, develop, phase2-continuation]
    paths:
      - "services/**"
      - "k8s/**"
      - ".github/workflows/deploy-dev.yml"
      - "docker-compose.yml"
  workflow_dispatch:

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Verify environment boundary (AWS account and registry)
        env:
          EXPECTED_AWS_ACCOUNT_ID: ${{ secrets.EXPECTED_AWS_ACCOUNT_ID }}
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
        run: |
          caller_account_id=$(aws sts get-caller-identity --query Account --output text)
          echo "Caller account: ${caller_account_id}"

          if [ -n "${EXPECTED_AWS_ACCOUNT_ID}" ] && [ "${caller_account_id}" != "${EXPECTED_AWS_ACCOUNT_ID}" ]; then
            echo "AWS account mismatch: expected ${EXPECTED_AWS_ACCOUNT_ID}, got ${caller_account_id}"
            exit 1
          fi

          ecr_account_id=$(echo "${ECR_REGISTRY}" | cut -d. -f1)
          if [ "${caller_account_id}" != "${ecr_account_id}" ]; then
            echo "ECR registry account mismatch: registry=${ecr_account_id}, caller=${caller_account_id}"
            exit 1
          fi

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push service images
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          for s in catalog cart checkout auth admin invoice-worker; do
            docker build -t ${ECR_REGISTRY}/shopcloud-$s:${IMAGE_TAG} ./services/$s
            docker push ${ECR_REGISTRY}/shopcloud-$s:${IMAGE_TAG}
          done

      - name: Resolve immutable image digests
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          mkdir -p artifacts
          MANIFEST_PATH="artifacts/promotion-manifest.json"
          echo "{}" > "${MANIFEST_PATH}"

          for s in catalog cart checkout auth admin invoice-worker; do
            digest=$(aws ecr describe-images \
              --repository-name "shopcloud-$s" \
              --image-ids imageTag="${IMAGE_TAG}" \
              --query 'imageDetails[0].imageDigest' \
              --output text)

            if [ -z "${digest}" ] || [ "${digest}" = "None" ]; then
              echo "Failed to resolve digest for service ${s}"
              exit 1
            fi

            image_uri="${ECR_REGISTRY}/shopcloud-${s}@${digest}"
            tmp_file=$(mktemp)
            jq --arg svc "${s}" --arg uri "${image_uri}" '.[$svc]=$uri' "${MANIFEST_PATH}" > "${tmp_file}"
            mv "${tmp_file}" "${MANIFEST_PATH}"
          done

          jq --arg sha "${IMAGE_TAG}" '. + {"sourceSha": $sha}' "${MANIFEST_PATH}" > "${MANIFEST_PATH}.tmp"
          mv "${MANIFEST_PATH}.tmp" "${MANIFEST_PATH}"
          cat "${MANIFEST_PATH}"

      - name: Upload promotion manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: promotion-manifest-${{ github.sha }}
          path: artifacts/promotion-manifest.json
          if-no-files-found: error

      - name: Configure kubeconfig for EKS
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
        run: |
          aws eks update-kubeconfig --name "${EKS_CLUSTER_NAME}" --region "${AWS_REGION}"

      - name: Validate admin private ingress prerequisites
        env:
          ENABLE_ADMIN_PRIVATE_INGRESS: ${{ secrets.ENABLE_ADMIN_PRIVATE_INGRESS }}
        run: |
          if [ "${ENABLE_ADMIN_PRIVATE_INGRESS}" != "true" ]; then
            echo "Admin private ingress disabled for this environment."
            exit 0
          fi

          echo "Admin private ingress enabled. Validating AWS Load Balancer Controller..."
          if ! kubectl get deployment aws-load-balancer-controller -n kube-system >/dev/null 2>&1; then
            echo "Missing deployment kube-system/aws-load-balancer-controller."
            echo "Install the controller or set ENABLE_ADMIN_PRIVATE_INGRESS=false."
            exit 1
          fi

          kubectl rollout status deployment/aws-load-balancer-controller -n kube-system --timeout=300s

      - name: Sanitize legacy checkout env conflicts
        run: |
          # Some older deployments carried CHECKOUT_CONFIG_SECRET_ID as a literal value.
          # Remove it before server-side apply so valueFrom can be applied cleanly.
          kubectl set env deployment/checkout CHECKOUT_CONFIG_SECRET_ID- || true

      - name: Apply Kubernetes manifests (exclude app secrets)
        env:
          ENABLE_ADMIN_PRIVATE_INGRESS: ${{ secrets.ENABLE_ADMIN_PRIVATE_INGRESS }}
        run: |
          for f in k8s/*.yaml; do
            base="$(basename "$f")"
            if [ "${base}" = "app-secrets.yaml" ]; then
              echo "Skipping $f (managed outside CI)"
              continue
            fi
            if [ "${base}" = "admin-private-ingress.yaml" ] && [ "${ENABLE_ADMIN_PRIVATE_INGRESS}" != "true" ]; then
              echo "Skipping $f (admin private ingress disabled for this environment)"
              continue
            fi
            # Server-side apply avoids stale last-applied annotation merge conflicts.
            kubectl apply --server-side --force-conflicts --validate=false -f "$f"
          done

      - name: Restart nginx to pick up ConfigMap UI updates
        run: |
          kubectl rollout restart deployment/nginx || true

      - name: Stabilize deployment strategies
        run: |
          # Keep required HA replicas for core microservices.
          kubectl scale deployment/catalog --replicas=2
          kubectl scale deployment/cart --replicas=2
          kubectl scale deployment/checkout --replicas=2
          kubectl scale deployment/auth --replicas=2
          kubectl scale deployment/admin --replicas=2
          # Single worker is acceptable for the async processor.
          kubectl scale deployment/invoice-worker --replicas=1

          # Force no-surge rollout behavior to prevent pending surge pods.
          kubectl patch deployment/catalog --type=merge -p '{"spec":{"strategy":{"type":"RollingUpdate","rollingUpdate":{"maxSurge":0,"maxUnavailable":1}}}}'
          kubectl patch deployment/cart --type=merge -p '{"spec":{"strategy":{"type":"RollingUpdate","rollingUpdate":{"maxSurge":0,"maxUnavailable":1}}}}'
          kubectl patch deployment/checkout --type=merge -p '{"spec":{"strategy":{"type":"RollingUpdate","rollingUpdate":{"maxSurge":0,"maxUnavailable":1}}}}'
          kubectl patch deployment/auth --type=merge -p '{"spec":{"strategy":{"type":"RollingUpdate","rollingUpdate":{"maxSurge":0,"maxUnavailable":1}}}}'
          kubectl patch deployment/admin --type=merge -p '{"spec":{"strategy":{"type":"RollingUpdate","rollingUpdate":{"maxSurge":0,"maxUnavailable":1}}}}'
          kubectl patch deployment/invoice-worker --type=merge -p '{"spec":{"strategy":{"type":"RollingUpdate","rollingUpdate":{"maxSurge":0,"maxUnavailable":1}}}}'

      - name: Update deployment images
        run: |
          MANIFEST_PATH="artifacts/promotion-manifest.json"
          kubectl set image deployment/catalog catalog=$(jq -r '.catalog' "${MANIFEST_PATH}")
          kubectl set image deployment/cart cart=$(jq -r '.cart' "${MANIFEST_PATH}")
          kubectl set image deployment/checkout checkout=$(jq -r '.checkout' "${MANIFEST_PATH}")
          kubectl set image deployment/auth auth=$(jq -r '.auth' "${MANIFEST_PATH}")
          kubectl set image deployment/admin admin=$(jq -r '.admin' "${MANIFEST_PATH}")
          kubectl set image deployment/invoice-worker invoice-worker=$(jq -r '.["invoice-worker"]' "${MANIFEST_PATH}")

      - name: Wait for rollouts
        run: |
          # Give EKS enough time on busy clusters.
          kubectl rollout status deployment/catalog --timeout=900s
          kubectl rollout status deployment/cart --timeout=900s
          kubectl rollout status deployment/checkout --timeout=900s
          kubectl rollout status deployment/auth --timeout=900s
          kubectl rollout status deployment/admin --timeout=900s
          kubectl rollout status deployment/invoice-worker --timeout=900s

      - name: Enforce HA replica readiness for core services
        run: |
          for svc in catalog cart checkout auth admin; do
            desired=$(kubectl get deployment/${svc} -o jsonpath='{.spec.replicas}')
            ready=$(kubectl get deployment/${svc} -o jsonpath='{.status.readyReplicas}')
            available=$(kubectl get deployment/${svc} -o jsonpath='{.status.availableReplicas}')
            ready=${ready:-0}
            available=${available:-0}
            echo "${svc}: desired=${desired}, ready=${ready}, available=${available}"

            if [ "${desired}" -lt 2 ] || [ "${ready}" -lt 2 ] || [ "${available}" -lt 2 ]; then
              echo "HA requirement failed for ${svc}: expected at least 2 desired/ready/available replicas."
              kubectl get deployment/${svc} -o wide || true
              kubectl get pods -l app=${svc} -o wide || true
              kubectl describe deployment/${svc} || true
              exit 1
            fi
          done

      - name: Health check
        run: |
          kubectl get deployments
