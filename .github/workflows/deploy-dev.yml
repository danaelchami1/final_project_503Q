name: Deploy Dev

on:
  push:
    branches: [main, develop, phase2-continuation]
    paths:
      - "services/**"
      - "k8s/**"
      - ".github/workflows/deploy-dev.yml"
      - "docker-compose.yml"
  workflow_dispatch:

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Verify environment boundary (AWS account and registry)
        env:
          EXPECTED_AWS_ACCOUNT_ID: ${{ secrets.EXPECTED_AWS_ACCOUNT_ID }}
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
        run: |
          caller_account_id=$(aws sts get-caller-identity --query Account --output text)
          echo "Caller account: ${caller_account_id}"

          if [ -n "${EXPECTED_AWS_ACCOUNT_ID}" ] && [ "${caller_account_id}" != "${EXPECTED_AWS_ACCOUNT_ID}" ]; then
            echo "AWS account mismatch: expected ${EXPECTED_AWS_ACCOUNT_ID}, got ${caller_account_id}"
            exit 1
          fi

          ecr_account_id=$(echo "${ECR_REGISTRY}" | cut -d. -f1)
          if [ "${caller_account_id}" != "${ecr_account_id}" ]; then
            echo "ECR registry account mismatch: registry=${ecr_account_id}, caller=${caller_account_id}"
            exit 1
          fi

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push service images
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          for s in catalog cart checkout auth admin invoice-worker; do
            docker build -t ${ECR_REGISTRY}/shopcloud-$s:${IMAGE_TAG} ./services/$s
            docker push ${ECR_REGISTRY}/shopcloud-$s:${IMAGE_TAG}
          done

      - name: Configure kubeconfig for EKS
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
        run: |
          aws eks update-kubeconfig --name "${EKS_CLUSTER_NAME}" --region "${AWS_REGION}"

      - name: Apply Kubernetes manifests (exclude app secrets)
        run: |
          for f in k8s/*.yaml; do
            if [ "$(basename "$f")" = "app-secrets.yaml" ]; then
              echo "Skipping $f (managed outside CI)"
              continue
            fi
            kubectl apply -f "$f"
          done

      - name: Stabilize deployment strategies
        run: |
          # Keep single replicas on constrained nodes to avoid rollout deadlocks.
          kubectl scale deployment/catalog --replicas=1
          kubectl scale deployment/cart --replicas=1
          kubectl scale deployment/checkout --replicas=1
          kubectl scale deployment/auth --replicas=1
          kubectl scale deployment/admin --replicas=1
          kubectl scale deployment/invoice-worker --replicas=1

          # Force no-surge rollout behavior to prevent pending surge pods.
          kubectl patch deployment/catalog --type=merge -p '{"spec":{"strategy":{"type":"RollingUpdate","rollingUpdate":{"maxSurge":0,"maxUnavailable":1}}}}'
          kubectl patch deployment/cart --type=merge -p '{"spec":{"strategy":{"type":"RollingUpdate","rollingUpdate":{"maxSurge":0,"maxUnavailable":1}}}}'
          kubectl patch deployment/checkout --type=merge -p '{"spec":{"strategy":{"type":"RollingUpdate","rollingUpdate":{"maxSurge":0,"maxUnavailable":1}}}}'
          kubectl patch deployment/auth --type=merge -p '{"spec":{"strategy":{"type":"RollingUpdate","rollingUpdate":{"maxSurge":0,"maxUnavailable":1}}}}'
          kubectl patch deployment/admin --type=merge -p '{"spec":{"strategy":{"type":"RollingUpdate","rollingUpdate":{"maxSurge":0,"maxUnavailable":1}}}}'
          kubectl patch deployment/invoice-worker --type=merge -p '{"spec":{"strategy":{"type":"RollingUpdate","rollingUpdate":{"maxSurge":0,"maxUnavailable":1}}}}'

      - name: Update deployment images
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          kubectl set image deployment/catalog catalog=${ECR_REGISTRY}/shopcloud-catalog:${IMAGE_TAG}
          kubectl set image deployment/cart cart=${ECR_REGISTRY}/shopcloud-cart:${IMAGE_TAG}
          kubectl set image deployment/checkout checkout=${ECR_REGISTRY}/shopcloud-checkout:${IMAGE_TAG}
          kubectl set image deployment/auth auth=${ECR_REGISTRY}/shopcloud-auth:${IMAGE_TAG}
          kubectl set image deployment/admin admin=${ECR_REGISTRY}/shopcloud-admin:${IMAGE_TAG}
          kubectl set image deployment/invoice-worker invoice-worker=${ECR_REGISTRY}/shopcloud-invoice-worker:${IMAGE_TAG}

      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/catalog --timeout=300s
          kubectl rollout status deployment/cart --timeout=300s
          kubectl rollout status deployment/checkout --timeout=300s
          kubectl rollout status deployment/auth --timeout=300s
          kubectl rollout status deployment/admin --timeout=300s
          kubectl rollout status deployment/invoice-worker --timeout=300s

      - name: Health check
        run: |
          kubectl get deployments
