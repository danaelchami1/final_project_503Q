<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopCloud Frontend</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 24px; background: #fafafa; }
      h1 { margin-bottom: 8px; }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; }
      .card { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 12px; }
      input, button { margin: 4px 0; padding: 8px; width: 100%; box-sizing: border-box; }
      button { cursor: pointer; }
      pre { background: #111; color: #eee; padding: 10px; border-radius: 6px; overflow: auto; min-height: 120px; }
      .muted { color: #666; font-size: 13px; }
    </style>
  </head>
  <body>
    <h1>ShopCloud Test Frontend</h1>
    <p class="muted">Use this page to test auth, catalog, cart, and checkout flows.</p>

    <div class="grid">
      <section class="card">
        <h3>1) Login (local auth mode only)</h3>
        <input id="email" value="customer@example.com" />
        <input id="password" type="password" value="customer123" />
        <button id="loginBtn">Login</button>
      </section>

      <section class="card">
        <h3>2) List Products</h3>
        <button id="productsBtn">Fetch Products</button>
      </section>

      <section class="card">
        <h3>3) Add to Cart</h3>
        <input id="userId" value="u1" />
        <input id="productId" value="p-1001" />
        <input id="quantity" type="number" value="1" />
        <button id="addCartBtn">Add Item</button>
        <button id="viewCartBtn">View Cart</button>
        <button id="clearCartBtn">Clear Cart</button>
      </section>

      <section class="card">
        <h3>4) Checkout</h3>
        <input id="checkoutUserId" value="u1" />
        <input id="checkoutEmail" value="customer@example.com" />
        <button id="checkoutBtn">Submit Checkout</button>
        <button id="ordersBtn">View Orders</button>
      </section>
    </div>

    <h3>Result</h3>
    <pre id="output">Ready.</pre>
    <script src="/app.js"></script>
  </body>
  </html>
